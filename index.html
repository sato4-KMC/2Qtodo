<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskPilot</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="top-block-plan">
    <div class="top-block-plan-head">
      <div class="top-block-plan-time">
        <span class="material-icons" style="font-size: 24px;">alarm</span>
        <span style="font-size: 30px; font-weight: bold;">30</span>
        <span style="font-size: 14px;">分後</span>
      </div>
      <div class="logout">
        <button id="logout-btn" class="material-icons">logout</button>
      </div>
    </div>
    <div style="font-size: 22px; font-weight: bold;">技研さんMTG</div>
    <div style="font-size: 14px;">説明 MTGリンクHTML</div>
  </div>
  <div class="top-block-blank">
    <div class="logout">
      <button id="logout-btn" class="material-icons">logout</button>
    </div>
    予定なし
  </div>
  <button id="login-btn" class="top-block-logout">
    Googleログイン
  </button>
  <div class="tab-block">
    <div class="tab-block-text">
      <span class="material-icons">
        reviews
      </span>
      <span style="font-size: 22px; font-weight: bold; margin-left: 3px;">
        おすすめのタスク
      </span>
    </div>
    <div class="tab-block-button">
      <span class="material-icons">
        autorenew
      </span>
    </div>
  </div>
  <div class="card-scroll-container">
    <div class="card-add"></div>
    <div class="card" id="initial-card">カード1</div>
    <div class="card">カード2</div>
    <div class="card">カード3</div>
    <div class="card-sized-box"></div>
  </div>

  <script src="main.js" type="module"></script>
  <script src="bottom_block.js"></script>
</body></html>
